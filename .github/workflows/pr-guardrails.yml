name: PR Guardrails

on:
  pull_request:

jobs:
  validate-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run PR guardrail checks
        run: |
          python scripts/validate_pr_changes.py "${{ github.base_ref }}"
